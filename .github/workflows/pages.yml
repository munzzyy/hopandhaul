name: Deploy web UI to Pages

# Publishes src/hopandhaul/ui/ (the in-browser port of hopandhaul — see
# src/hopandhaul/ui/engine/) to GitHub Pages. The app is fully static and runs client-side
# (no build, no bundler) — this job's only real work is staging the airport/gateway data JSON
# into the published directory before upload; everything else is a file copy.
#
# Cole enables Pages and cuts the release after a security gate — this workflow existing does
# not turn Pages on by itself (see repo Settings > Pages, and the `environment:` block below,
# which only starts creating deployments once that's configured).

on:
  push:
    branches: [main]
    paths:
      - "src/hopandhaul/ui/**"
      - "src/hopandhaul/data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Stage the airport/gateway data JSON into the published site
        # engine/data.js fetches these as "./data/<file>" relative to ui/ — same two files
        # server.py's geo.py reads, copied here instead of duplicated in git (single source of
        # truth stays src/hopandhaul/data/). This is a plain file copy, not a build step.
        run: |
          mkdir -p src/hopandhaul/ui/data
          cp src/hopandhaul/data/airports.json src/hopandhaul/data/gateways.json \
             src/hopandhaul/data/ferries.json src/hopandhaul/data/landgrid.json \
             src/hopandhaul/data/fareanchors.json src/hopandhaul/ui/data/
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: src/hopandhaul/ui
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
