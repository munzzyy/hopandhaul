name: Bug report
description: Something's wrong with the engine, the server, or the UI
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        Include the exact command or the map click / form inputs that trigger it. If it's a
        `--json` or API response, paste the actual output (redact any real API keys first).
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12"
    validations:
      required: false

  - type: input
    id: install
    attributes:
      label: Installed how
      placeholder: pip install -e . / ran modules directly / other
    validations:
      required: false

  - type: textarea
    id: selftest
    attributes:
      label: Self-test status
      description: >
        Did `python -m hopandhaul.<module> --selftest` pass for the module(s) involved? Paste
        the output if it's relevant.
    validations:
      required: false
